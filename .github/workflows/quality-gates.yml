name: Quality Gates

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        guard_scope: [delta, baseline]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Canonical guardrails
        run: |
          python tools/dev_workflow.py dev-check --guard-scope ${{ matrix.guard_scope }}

  web-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: TypeScript type check
        run: npm run typecheck
        working-directory: web

      - name: ESLint
        run: npm run lint
        working-directory: web

      - name: Prettier format check
        run: npm run format:check
        working-directory: web

  default-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: guardrails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Canonical default suite
        run: |
          python tools/dev_workflow.py test-default

  product-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: default-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Canonical smoke suite
        run: |
          python tools/dev_workflow.py test-smoke
