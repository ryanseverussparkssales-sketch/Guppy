name: Quality Gates

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        guard_scope: [delta, baseline]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Canonical guardrails
        run: |
          python tools/dev_workflow.py dev-check --guard-scope ${{ matrix.guard_scope }}

  default-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: guardrails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Canonical default suite
        run: |
          python tools/dev_workflow.py test-default

  product-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: default-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Canonical smoke suite
        run: |
          python tools/dev_workflow.py test-smoke
