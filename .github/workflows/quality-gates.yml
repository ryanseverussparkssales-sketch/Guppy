name: Quality Gates

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        guard_scope: [delta, baseline]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Module line-cap guard
        env:
          GUPPY_GUARD_SCOPE: ${{ matrix.guard_scope }}
        run: |
          python tools/check_new_module_line_cap.py

      - name: Architecture boundary guard
        env:
          GUPPY_GUARD_SCOPE: ${{ matrix.guard_scope }}
        run: |
          python tools/check_architecture_boundaries.py

      - name: Runtime artifact hygiene guard
        if: matrix.guard_scope == 'delta'
        env:
          GUPPY_GUARD_SCOPE: ${{ matrix.guard_scope }}
        run: |
          python tools/check_runtime_artifact_hygiene.py

      - name: Wrapper integrity guard
        run: |
          python tools/check_wrapper_integrity.py

      - name: Core surface integrity guard
        run: |
          python tools/check_core_surface_integrity.py

      - name: Doc ownership guard
        run: |
          python tools/check_doc_ownership.py

      - name: Tool schema audit
        run: |
          python tools/audit_tool_schemas.py

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: guardrails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Runtime smoke tests
        run: |
          python -m unittest tests.test_runtime_smoke

      - name: Reminder workflow tests
        run: |
          python -m unittest tests.test_reminder_workflow

      - name: Launcher interaction smoke tests
        run: |
          python -m pytest tests/test_launcher_interactions_smoke.py -q

      - name: Security hardening tests
        run: |
          python -m pytest tests/test_security_hardening.py -q
