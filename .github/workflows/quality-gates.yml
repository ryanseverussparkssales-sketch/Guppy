name: Quality Gates

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tool schema audit
        run: |
          python tools/audit_tool_schemas.py

      - name: Runtime smoke tests
        run: |
          python -m unittest tests.test_runtime_smoke

      - name: Reminder workflow tests
        run: |
          python -m unittest tests.test_reminder_workflow
