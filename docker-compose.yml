# Guppy application stack
#
# Starts the FastAPI backend.  llama.cpp model servers are launched separately
# (see bin/ launcher scripts or docker/docker-compose.vllm.yml for GPU inference).
#
# Usage:
#   cp .env.example .env          # fill in GUPPY_JWT_SECRET at minimum
#   docker compose up -d
#   docker compose logs -f api
#
# Stop:
#   docker compose down
#
# Rebuild after code changes:
#   docker compose build api && docker compose up -d api

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: guppy-api:latest
    container_name: guppy-api
    restart: unless-stopped

    ports:
      - "${GUPPY_PORT:-8080}:8080"

    # Mount persistent data outside the container so databases + logs
    # survive restarts without needing volume exports.
    volumes:
      - ./runtime:/app/runtime
      - ./data:/app/data

    environment:
      # ── Required ─────────────────────────────────────────────────────────
      - GUPPY_JWT_SECRET=${GUPPY_JWT_SECRET:?Set GUPPY_JWT_SECRET in .env}

      # ── Optional cloud providers ──────────────────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # ── Optional Google integration ───────────────────────────────────────
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN:-}

      # ── Optional CRM / VoIP ───────────────────────────────────────────────
      - HUBSPOT_API_KEY=${HUBSPOT_API_KEY:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}

      # ── Dev mode (disable in production) ─────────────────────────────────
      - GUPPY_DEV_MODE=${GUPPY_DEV_MODE:-0}

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    # Keep logs manageable
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
