[pytest]
pythonpath = src .
testpaths = tests/unit tests/integration tests/smoke tests/test_security_hardening.py
cache_dir = .tmp/pytest-cache
addopts = -q --ignore=tests/integration/test_ptt.py
asyncio_mode = auto
markers =
    smoke: smoke tests requiring a running server or Qt (run with -m smoke)

[coverage:run]
source = src/guppy
omit =
    src/guppy/merlin/*
    */__pycache__/*

[coverage:report]
show_missing = true
fail_under = 40
