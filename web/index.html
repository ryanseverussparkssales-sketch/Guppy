<!DOCTYPE html>
<html lang="en" data-theme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guppy - AI Assistant</title>

    <!-- Security headers (defense-in-depth alongside HTTP headers from backend) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <!--
      CSP notes:
      - style-src 'unsafe-inline' required for Shiki syntax highlighting (inline styles on <span>)
      - connect-src allows both the API server and WebSocket for streaming
      - img-src data: allows base64 screenshots from the desktop API
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src https://fonts.gstatic.com data:;
        img-src 'self' data: blob:;
        connect-src 'self' http://127.0.0.1:8081 ws://127.0.0.1:8081;
        worker-src 'self' blob:;
        frame-ancestors 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />
    <meta name="permissions-policy" content="camera=(), microphone=(self), geolocation=()" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
