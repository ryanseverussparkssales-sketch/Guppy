<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guppy AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            color: white;
            font-weight: bold;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .auth-section {
            margin-bottom: 30px;
        }

        .turnstile-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .auth-button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            max-width: 200px;
        }

        .auth-button:hover {
            transform: translateY(-2px);
        }

        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .chat-section {
            display: none;
        }

        .chat-container {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            height: 400px;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: white;
            border-radius: 10px 10px 0 0;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.user {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .message.guppy {
            background: #f0f0f0;
            color: #333;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            background: #fafafa;
            border-radius: 0 0 10px 10px;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .message-input:focus {
            border-color: #667eea;
        }

        .send-button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .send-button:hover {
            transform: translateY(-2px);
        }

        .status {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            border: 1px solid #fcc;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .voice-button {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
            transition: transform 0.2s;
        }

        .voice-button:hover {
            transform: translateY(-2px);
        }

        .voice-button.recording {
            background: #dc3545;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .model-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .model-toggle button {
            padding: 8px 16px;
            border: 1px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .model-toggle button.active {
            background: #667eea;
            color: white;
        }

        .model-toggle button:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🐟</div>
            <h1>Guppy</h1>
            <p class="subtitle">Your AI Assistant</p>
        </div>

        <div id="auth-section" class="auth-section">
            <p style="text-align: center; margin-bottom: 20px; color: #666;">
                Complete the security check to start chatting
            </p>
            <div class="turnstile-container">
                <div id="turnstile-widget"></div>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button id="auth-button" class="auth-button" disabled>
                    Start Chatting
                </button>
            </div>
        </div>

        <div id="chat-section" class="chat-section">
            <div class="model-toggle">
                <button id="claude-btn" class="active">Claude</button>
                <button id="ollama-btn">Ollama</button>
            </div>

            <div class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <div class="message guppy">
                        Hello! I'm Guppy, your AI assistant. How can I help you today?
                    </div>
                </div>
                <div class="chat-input">
                    <input type="text" id="message-input" class="message-input"
                           placeholder="Type your message..." maxlength="1000">
                    <button id="send-button" class="send-button">Send</button>
                    <button id="voice-button" class="voice-button" title="Voice input">
                        🎤
                    </button>
                </div>
            </div>
        </div>

        <div id="status" class="status">
            Ready to connect...
        </div>
    </div>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="turnstile.js"></script>
</body>
</html>
