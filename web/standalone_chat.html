<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guppy Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f; --surface: #16161a; --border: #2a2a35;
    --accent: #7c6af7; --accent2: #4fc3f7; --text: #e8e8f0;
    --muted: #6b6b80; --user-bg: #1e1e2e; --ai-bg: #13131a;
    --danger: #ef4444;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
         display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  header { padding: 12px 20px; border-bottom: 1px solid var(--border);
           display: flex; align-items: center; gap: 12px; background: var(--surface); }
  header h1 { font-size: 1rem; font-weight: 600; color: var(--accent); flex: 1; }
  select { background: var(--bg); color: var(--text); border: 1px solid var(--border);
           border-radius: 6px; padding: 5px 10px; font-size: 0.85rem; cursor: pointer; }
  select:focus { outline: 2px solid var(--accent); }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  #status-dot.error { background: var(--danger); }

  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg { max-width: 820px; width: 100%; padding: 12px 16px; border-radius: 10px;
         line-height: 1.6; font-size: 0.92rem; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: var(--user-bg); border: 1px solid var(--border);
              align-self: flex-end; color: var(--text); }
  .msg.assistant { background: var(--ai-bg); border: 1px solid var(--border);
                   align-self: flex-start; }
  .msg .role { font-size: 0.72rem; font-weight: 600; margin-bottom: 4px;
               text-transform: uppercase; letter-spacing: 0.05em; }
  .msg.user .role { color: var(--accent); }
  .msg.assistant .role { color: var(--accent2); }
  .msg.error { border-color: var(--danger); color: var(--danger); }

  .msg code { background: #1e1e30; padding: 1px 5px; border-radius: 4px;
              font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.88em; }
  .msg pre { background: #1e1e30; padding: 12px; border-radius: 8px; overflow-x: auto;
             margin: 8px 0; }
  .msg pre code { background: none; padding: 0; }

  #image-preview { padding: 0 16px 8px; display: none; }
  #image-preview img { height: 80px; border-radius: 6px; border: 1px solid var(--border); }
  #image-preview button { margin-left: 8px; background: none; border: none;
                          color: var(--danger); cursor: pointer; font-size: 1.1rem; vertical-align: middle; }

  footer { border-top: 1px solid var(--border); background: var(--surface); padding: 12px 16px; }
  #input-row { display: flex; gap: 8px; align-items: flex-end; }
  #user-input { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
                border-radius: 8px; padding: 10px 14px; font-size: 0.92rem; resize: none;
                min-height: 44px; max-height: 200px; font-family: inherit; line-height: 1.5; }
  #user-input:focus { outline: 2px solid var(--accent); }
  button.icon-btn { background: var(--accent); color: white; border: none; border-radius: 8px;
                    padding: 10px 14px; cursor: pointer; font-size: 1rem; transition: opacity 0.15s;
                    flex-shrink: 0; height: 44px; }
  button.icon-btn:hover { opacity: 0.85; }
  button.icon-btn:disabled { opacity: 0.4; cursor: default; }
  button.icon-btn.secondary { background: var(--border); }
  #hint { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
  .thinking { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<header>
  <div id="status-dot" title="Ollama status"></div>
  <h1>Guppy Chat</h1>
  <select id="model-select">
    <option value="guppy">guppy (32B)</option>
    <option value="guppy-fast">guppy-fast (7B)</option>
    <option value="guppy-code">guppy-code (Qwen3-Coder)</option>
    <option value="guppy-vision">guppy-vision (9B multimodal)</option>
    <option value="guppy-vision-pro">guppy-vision-pro (Gemma4 26B)</option>
    <option value="guppy-teach">guppy-teach</option>
    <option value="qwen3:8b">qwen3:8b</option>
    <option value="gemma3:12b">gemma3:12b</option>
  </select>
  <button class="icon-btn secondary" id="clear-btn" title="Clear chat">🗑</button>
</header>

<div id="image-preview">
  <img id="preview-img" src="" alt="attached image">
  <button id="remove-img" title="Remove image">✕</button>
</div>

<div id="messages">
  <div class="msg assistant">
    <div class="role">Guppy</div>
    Hello! I'm running locally on your machine. How can I help?
  </div>
</div>

<footer>
  <div id="input-row">
    <textarea id="user-input" placeholder="Message Guppy… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button class="icon-btn secondary" id="img-btn" title="Attach image (vision models)">🖼</button>
    <button class="icon-btn" id="send-btn">Send</button>
  </div>
  <div id="hint">Shift+Enter for newline · Ctrl+V to paste image · Model: <span id="model-hint">guppy</span></div>
</footer>

<input type="file" id="file-input" accept="image/*" style="display:none">

<script>
const OLLAMA = 'http://127.0.0.1:11434';
const messages = [];
let attachedImageB64 = null;
let isStreaming = false;

const modelSelect = document.getElementById('model-select');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const msgContainer = document.getElementById('messages');
const statusDot = document.getElementById('status-dot');
const modelHint = document.getElementById('model-hint');
const imagePreview = document.getElementById('image-preview');
const previewImg = document.getElementById('preview-img');
const fileInput = document.getElementById('file-input');

modelSelect.addEventListener('change', () => { modelHint.textContent = modelSelect.value; });

async function checkOllama() {
  try {
    const r = await fetch(`${OLLAMA}/`);
    statusDot.className = r.ok ? '' : 'error';
  } catch { statusDot.className = 'error'; }
}
checkOllama();
setInterval(checkOllama, 10000);

function scrollBottom() {
  msgContainer.scrollTop = msgContainer.scrollHeight;
}

function renderMarkdown(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

function addMessage(role, content, streaming = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const roleDiv = document.createElement('div');
  roleDiv.className = 'role';
  roleDiv.textContent = role === 'user' ? 'You' : 'Guppy';
  const contentDiv = document.createElement('div');
  contentDiv.className = 'content';
  if (streaming) contentDiv.innerHTML = '<span class="thinking">▊</span>';
  else contentDiv.innerHTML = renderMarkdown(content);
  div.appendChild(roleDiv);
  div.appendChild(contentDiv);
  msgContainer.appendChild(div);
  scrollBottom();
  return contentDiv;
}

function setAttachedImage(b64, mimeType = 'image/png') {
  attachedImageB64 = b64;
  previewImg.src = `data:${mimeType};base64,${b64}`;
  imagePreview.style.display = 'block';
}

document.getElementById('remove-img').onclick = () => {
  attachedImageB64 = null;
  imagePreview.style.display = 'none';
};

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const [header, b64] = e.target.result.split(',');
    const mime = header.match(/:(.*?);/)[1];
    setAttachedImage(b64, mime);
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

document.getElementById('img-btn').onclick = () => fileInput.click();

document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = ev => {
        const [header, b64] = ev.target.result.split(',');
        const mime = header.match(/:(.*?);/)[1];
        setAttachedImage(b64, mime);
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
});

document.getElementById('clear-btn').onclick = () => {
  messages.length = 0;
  msgContainer.innerHTML = '';
  attachedImageB64 = null;
  imagePreview.style.display = 'none';
};

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
});

sendBtn.addEventListener('click', send);

async function send() {
  const text = userInput.value.trim();
  if (!text || isStreaming) return;

  const model = modelSelect.value;
  const isVision = model.includes('vision');

  // Build message content
  const userContent = attachedImageB64
    ? [{ type: 'text', text }, { type: 'image_url', image_url: { url: `data:image/png;base64,${attachedImageB64}` } }]
    : text;

  // Ollama chat format
  const ollamaMsg = { role: 'user', content: text };
  if (attachedImageB64) ollamaMsg.images = [attachedImageB64];

  messages.push(ollamaMsg);
  addMessage('user', text);
  if (attachedImageB64) {
    attachedImageB64 = null;
    imagePreview.style.display = 'none';
  }
  userInput.value = '';
  userInput.style.height = 'auto';

  isStreaming = true;
  sendBtn.disabled = true;
  const contentDiv = addMessage('assistant', '', true);

  let fullText = '';
  try {
    const resp = await fetch(`${OLLAMA}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model,
        messages,
        stream: true,
        options: { num_predict: 2048, temperature: 0.7 }
      })
    });

    if (!resp.ok) throw new Error(`Ollama error ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split('\n').filter(Boolean);
      for (const line of lines) {
        try {
          const obj = JSON.parse(line);
          const delta = obj?.message?.content || '';
          fullText += delta;
          contentDiv.innerHTML = renderMarkdown(fullText) + (obj.done ? '' : '<span class="thinking">▊</span>');
          scrollBottom();
        } catch {}
      }
    }

    messages.push({ role: 'assistant', content: fullText });
  } catch (err) {
    contentDiv.innerHTML = `<span style="color:var(--danger)">Error: ${err.message}</span>`;
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    userInput.focus();
  }
}
</script>
</body>
</html>
